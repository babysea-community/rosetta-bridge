version: 2.1

jobs:
  typescript-package:
    docker:
      - image: cimg/node:22.21
    working_directory: ~/project
    steps:
      - checkout
      - restore_cache:
          keys:
            - rosetta-bridge-npm-v1-{{ checksum "client/typescript/package-lock.json" }}
      - run:
          name: Install TypeScript dependencies
          command: cd client/typescript && npm ci
      - save_cache:
          key: rosetta-bridge-npm-v1-{{ checksum "client/typescript/package-lock.json" }}
          paths:
            - ~/.npm
      - run:
          name: TypeScript lint
          command: cd client/typescript && npm run lint
      - run:
          name: TypeScript coverage
          command: cd client/typescript && npm run test:coverage
      - persist_to_workspace:
          root: client/typescript
          paths:
            - coverage/lcov.info
      - run:
          name: TypeScript build
          command: cd client/typescript && npm run build
      - run:
          name: CLI smoke
          command: |
            cd client/typescript
            node dist/cli.mjs validate ../../examples/fixtures/bridge-definition.valid.json ../../examples/fixtures/request.valid-minimal.json
            node dist/cli.mjs schema ../../examples/fixtures/bridge-definition.valid.json
            node dist/cli.mjs map ../../examples/fixtures/bridge-definition.executable.mjs ../../examples/fixtures/request.valid-provider-mapping.json --provider provider_b
      - run:
          name: Package dry run
          command: cd client/typescript && npm pack --dry-run

  codecov-upload:
    docker:
      - image: cimg/base:stable
    working_directory: ~/project
    steps:
      - attach_workspace:
          at: ~/project/client/typescript
      - run:
          name: Upload coverage to Codecov
          command: |
            if [ -z "${CODECOV_TOKEN:-}" ]; then
              echo "CODECOV_TOKEN is not configured in CircleCI; skipping trusted main coverage upload."
              exit 0
            fi
            curl -fsSLO https://cli.codecov.io/latest/linux/codecov
            chmod +x codecov
            ./codecov --auto-load-params-from CircleCI upload-process \
              -Z \
              -t "$CODECOV_TOKEN" \
              -C "$CIRCLE_SHA1" \
              -f client/typescript/coverage/lcov.info \
              --disable-search

workflows:
  package-check:
    jobs:
      - typescript-package
      - codecov-upload:
          requires:
            - typescript-package
          filters:
            branches:
              only: main