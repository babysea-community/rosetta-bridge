name: Package Check

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  typescript:
    name: TypeScript package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: client/typescript
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/typescript/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test:coverage
      - name: Upload coverage reports to Codecov
        if: ${{ github.actor != 'dependabot[bot]' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: codecov/codecov-action@v6
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: client/typescript/coverage/lcov.info
          fail_ci_if_error: true
          disable_search: true
      - run: npm run build
      - name: CLI smoke
        run: |
          node dist/cli.mjs validate ../../examples/fixtures/bridge-definition.valid.json ../../examples/fixtures/request.valid-minimal.json
          node dist/cli.mjs schema ../../examples/fixtures/bridge-definition.valid.json
          node dist/cli.mjs map ../../examples/fixtures/bridge-definition.executable.mjs ../../examples/fixtures/request.valid-provider-mapping.json --provider provider_b
      - run: npm pack --dry-run
